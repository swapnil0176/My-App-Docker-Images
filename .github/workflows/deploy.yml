name: Deploy to AWS ECR

on:
  push:
    branches:
      - main  # Triggers the pipeline whenever you push to the main branch

permissions:
  id-token: write # Required for secure OIDC authentication
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC Handshake)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::148221445490:role/GitHubActionsECRRole # Replace this
          aws-region: eu-north-1 # Replace with your region

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: app/my-app
          IMAGE_TAG: ${{ github.sha }} # Tags image with the unique GitHub commit ID
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG