apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstack-java-react
  namespace: default
spec:
  replicas: 2 # Launches 2 identical instances of your app for redundancy
  selector:
    matchLabels:
      app: java-react-app
  template:
    metadata:
      labels:
        app: java-react-app
    spec:
      containers:
      - name: java-react-container
        # Replace this with your exact image URI from ECR:
        # image: 148221445490.dkr.ecr.eu-north-1.amazonaws.com/app/my-app:YOUR_IMAGE_TAG
        image: 148221445490.dkr.ecr.eu-north-1.amazonaws.com/my-app-YOUR_IMAGE_TAG
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: java-react-service
  namespace: default
spec:
  type: LoadBalancer # Tells AWS to automatically provision an internet-facing Load Balancer
  selector:
    app: java-react-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080